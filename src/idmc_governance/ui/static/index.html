<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INCEPT Data Governance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    body { background: #cbd5e1; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: #cbd5e1; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }
    .pulse { animation: pulse-dot 1.4s ease-in-out infinite; }
    pre { white-space: pre-wrap; word-break: break-all; }
    @keyframes progress-shine { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .progress-bar-fill {
      transition: width 0.18s ease-out;
      background: linear-gradient(90deg, #6366f1 0%, #818cf8 40%, #6366f1 60%, #4338ca 100%);
      background-size: 200% 100%;
      animation: progress-shine 1.8s linear infinite;
    }
    .progress-bar-fill.done {
      background: #10b981;
      animation: none;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#6366f1', dark: '#4338ca', light: '#818cf8' },
            surface: { DEFAULT: '#f1f5f9', raised: '#e2e8f0', border: '#cbd5e1' },
          }
        }
      }
    }
  </script>
</head>
<body class="h-screen overflow-hidden">
<div id="root"></div>

<script type="text/babel" data-presets="react,env">
const { useState, useCallback, useRef, useEffect } = React;

// ── Step definitions ──────────────────────────────────────────────────────────
const STEPS = [
  { id: "discover",        num: 1, label: "Discover Catalog",         icon: "⬡", desc: "List all schemas and tables from the CDGC catalog." },
  { id: "scan",            num: 2, label: "Scan Table",                icon: "◈", desc: "Select a table and fetch its column metadata (cached after first run)." },
  { id: "taxonomy",        num: 3, label: "Generate Taxonomy",         icon: "◫", desc: "LLM generates a domain / subdomain / business-term tree from the scanned column metadata." },
  { id: "domain_structure",num: 4, label: "Domain Structure",          icon: "◧", desc: "Review and approve the proposed domain hierarchy, then write it to CDGC and register the source system and dataset." },
  { id: "curate",          num: 5, label: "Curate Columns",            icon: "◩", desc: "Link every column to its matching business term." },
  { id: "data_quality",           num: 6,  label: "Data Quality",                    icon: "◎", desc: "Creates DQ rules and generates interim scores for all registered rule occurrences in CDGC." },
  { id: "publish_governance",     num: 7,  label: "Publish to Governance Catalog",        icon: "◉", desc: "Triggers the MCC scan — CDQ rules run on live Snowflake data (5000 rows) and publish real DQ scores to the Governance Catalog." },
];

// ── Helpers ───────────────────────────────────────────────────────────────────
const STATUS = { idle: "idle", running: "running", done: "done", error: "error", skipped: "skipped" };
const SKIPPABLE = new Set(["taxonomy", "domain_structure", "curate", "data_quality", "publish_governance", "create_collection", "publish_marketplace_full", "configure_delivery", "consumer_access", "verify_access", "withdraw_access"]);

async function apiPost(path, body = {}, signal = undefined) {
  const r = await fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
    signal,
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

// ── Sub-components ────────────────────────────────────────────────────────────

function StatusDot({ status }) {
  if (status === STATUS.idle)    return <span className="w-2 h-2 rounded-full bg-slate-300 inline-block"/>;
  if (status === STATUS.running) return <span className="w-2 h-2 rounded-full bg-violet-500 inline-block pulse"/>;
  if (status === STATUS.done)    return <span className="w-2 h-2 rounded-full bg-emerald-500 inline-block"/>;
  if (status === STATUS.skipped) return <span className="w-2 h-2 rounded-full bg-amber-400 inline-block" title="Skipped"/>;
  if (status === STATUS.error)   return <span className="w-2 h-2 rounded-full bg-red-500 inline-block"/>;
}

function Spinner() {
  return (
    <svg className="spin w-4 h-4 text-brand" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" strokeOpacity="0.2"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
    </svg>
  );
}

function JsonViewer({ data, maxHeight = "320px" }) {
  const [expanded, setExpanded] = useState(false);
  const text = JSON.stringify(data, null, 2);
  return (
    <div className="rounded-lg bg-slate-800 border border-slate-700 overflow-hidden">
      <div className="flex items-center justify-between px-3 py-1.5 border-b border-slate-700 bg-slate-900">
        <span className="text-xs text-slate-400 font-mono">JSON</span>
        <button onClick={() => setExpanded(e => !e)} className="text-xs text-slate-400 hover:text-violet-400">
          {expanded ? "Collapse" : "Expand"}
        </button>
      </div>
      <div className="overflow-auto scrollbar-thin" style={{ maxHeight: expanded ? "none" : maxHeight }}>
        <pre className="p-3 text-xs text-slate-300 font-mono">{text}</pre>
      </div>
    </div>
  );
}

function SummaryCard({ label, value, color = "text-brand" }) {
  return (
    <div className="bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 flex flex-col gap-0.5 shadow-sm overflow-hidden">
      <span className={`text-lg font-bold truncate ${color}`} title={typeof value === 'string' ? value : undefined}>{value}</span>
      <span className="text-xs text-slate-400 uppercase tracking-wider font-medium">{label}</span>
    </div>
  );
}

// ── Step result renderers ─────────────────────────────────────────────────────

function SchemaTableList({ tables }) {
  const PREVIEW = 12;
  const [expanded, setExpanded] = React.useState(false);
  const shown = expanded ? tables : tables.slice(0, PREVIEW);
  return (
    <div className="flex flex-wrap gap-1 mt-1.5">
      {shown.map(t => (
        <span key={t.name} className="text-xs bg-white border border-slate-200 text-slate-600 px-1.5 py-0.5 rounded font-mono max-w-[220px] truncate inline-block" title={t.name}>{t.name}</span>
      ))}
      {!expanded && tables.length > PREVIEW && (
        <button onClick={() => setExpanded(true)}
          className="text-xs bg-indigo-50 border border-indigo-200 text-indigo-600 px-2 py-0.5 rounded hover:bg-indigo-100 cursor-pointer font-medium">
          +{tables.length - PREVIEW} more
        </button>
      )}
      {expanded && tables.length > PREVIEW && (
        <button onClick={() => setExpanded(false)}
          className="text-xs bg-slate-100 border border-slate-200 text-slate-500 px-2 py-0.5 rounded hover:bg-slate-200 cursor-pointer">
          show less
        </button>
      )}
    </div>
  );
}

function DiscoverResult({ data }) {
  const catalogSources  = data?.result?.catalog_sources_grouped || [];
  const total           = data?.result?.total_tables || 0;
  const [collapsed, setCollapsed] = React.useState({});
  const toggle = (key) => setCollapsed(prev => ({ ...prev, [key]: !prev[key] }));

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 gap-3">
        <SummaryCard label="Catalog Sources" value={catalogSources.length}/>
        <SummaryCard label="Total Tables"    value={total.toLocaleString()}/>
      </div>
      {catalogSources.map(cs => {
        const csKey  = cs.source;
        const isOpen = !collapsed[csKey];
        const dbCount = (cs.databases || []).length;
        const schemaCount = (cs.schemas || []).length;
        return (
          <div key={csKey} className="bg-white border border-indigo-200 rounded-xl overflow-hidden shadow-sm">
            {/* Level 1 — Catalog Source */}
            <button onClick={() => toggle(csKey)}
              className="w-full bg-indigo-600 text-white px-4 py-2.5 flex items-center justify-between hover:bg-indigo-700 transition-colors">
              <div className="flex items-center gap-2">
                <span className="text-sm font-bold tracking-wide">{cs.source}</span>
              </div>
              <div className="flex items-center gap-3 text-indigo-200 text-xs">
                <span>{cs.total_tables?.toLocaleString()} tables · {schemaCount} schema{schemaCount !== 1 ? "s" : ""}</span>
                <span className="text-lg leading-none">{isOpen ? "▾" : "▸"}</span>
              </div>
            </button>

            {isOpen && (cs.databases || [{ database: "", schemas: cs.schemas || [] }]).map(db => {
              const dbKey   = csKey + "/" + db.database;
              const dbOpen  = !collapsed[dbKey];
              const showDb  = db.database && db.database !== cs.source;
              return (
                <div key={dbKey}>
                  {/* Level 2 — Database (only shown when it differs from source name) */}
                  {showDb && (
                    <button onClick={() => toggle(dbKey)}
                      className="w-full bg-indigo-50 border-b border-indigo-100 px-4 py-1.5 flex items-center justify-between hover:bg-indigo-100 transition-colors">
                      <div className="flex items-center gap-2">
                        <span className="text-xs text-indigo-400 font-medium uppercase tracking-wider">Database</span>
                        <span className="text-xs font-mono font-semibold text-indigo-700">{db.database}</span>
                      </div>
                      <span className="text-indigo-400 text-sm">{dbOpen ? "▾" : "▸"}</span>
                    </button>
                  )}

                  {(!showDb || dbOpen) && (
                    <div className="p-3 space-y-2">
                      {(db.schemas || []).map(s => {
                        const sKey  = dbKey + "/" + s.schema;
                        const sOpen = !collapsed[sKey];
                        return (
                          <div key={sKey} className="bg-slate-50 border border-slate-200 rounded-lg overflow-hidden">
                            {/* Level 3 — Schema */}
                            <button onClick={() => toggle(sKey)}
                              className="w-full px-2.5 py-1.5 flex items-center justify-between hover:bg-slate-100 transition-colors">
                              <div className="flex items-center gap-1.5">
                                <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 inline-block"></span>
                                <span className="text-xs font-semibold text-slate-700">{s.schema}</span>
                                <span className="text-xs text-slate-400">({s.tables.length})</span>
                              </div>
                              <span className="text-slate-400 text-xs">{sOpen ? "▾" : "▸"}</span>
                            </button>
                            {/* Level 4 — Tables */}
                            {sOpen && (
                              <div className="px-2.5 pb-2.5">
                                <SchemaTableList tables={s.tables} />
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

function ScanResult({ data, scanSource, scanSchema }) {
  const cols = data?.columns?.[0];
  const scan = data?.scan?.result;
  if (!cols && !scan) return <JsonViewer data={data}/>;
  if (!cols) {
    const missing    = scan?.missing || [];
    const foundCount = scan?.found_count ?? 0;
    return (
      <div className="space-y-4">
        <div className="grid grid-cols-3 gap-3">
          <SummaryCard label="Found"   value={foundCount}       color="text-slate-500"/>
          <SummaryCard label="Missing" value={missing.length}   color="text-red-500"/>
          <SummaryCard label="Status"  value="Not Found"        color="text-red-500"/>
        </div>
        {missing.length > 0 && (
          <div className="bg-red-50 border border-red-200 rounded-lg p-3">
            <div className="text-xs text-red-500 font-medium mb-2 uppercase tracking-wider">Tables not found in catalog</div>
            <div className="flex flex-wrap gap-1.5">
              {missing.map(m => (
                <span key={m} className="text-xs bg-white border border-red-200 text-red-600 px-2 py-0.5 rounded font-mono">{m}</span>
              ))}
            </div>
            <p className="text-xs text-red-400 mt-2">Table may not be catalogued yet. Try scanning the MCC source first or select a different table.</p>
          </div>
        )}
      </div>
    );
  }

  const columnsList   = data?.columns?.filter(Boolean) || [cols];
  const scanned       = data?.tables_scanned  ?? columnsList.length;
  const totalInSchema = data?.total_in_schema ?? 0;
  const elapsed       = data?.elapsed_seconds ?? 0;
  const estMin        = data?.estimated_full_minutes ?? 0;

  const estLabel = estMin >= 60
    ? `~${(estMin / 60).toFixed(1)} hr`
    : estMin > 0 ? `~${estMin} min` : null;

  // Map column results to scan table metadata (schema/connection per table)
  const scanTables = scan?.tables || [];

  return (
    <div className="space-y-4">
      {/* Summary banner */}
      <div className="bg-green-50 border border-green-200 rounded-lg px-4 py-2 text-sm text-green-700 font-medium flex flex-wrap items-center gap-2">
        <span>Scanned <strong>{scanned}</strong> {scanned === 1 ? "table" : "tables"}{totalInSchema > scanned ? ` of ${totalInSchema.toLocaleString()}` : ""} in <span className="font-mono">{scanSchema === "__ALL_SCHEMAS__" ? "all schemas" : (scanSchema || "schema")}</span> — <strong>{elapsed}s</strong></span>
        {estLabel && totalInSchema > scanned && (
          <span className="text-green-600 text-xs bg-green-100 px-2 py-0.5 rounded">
            {scanSchema === "__ALL_SCHEMAS__" ? "All schemas" : "Full schema"}: {estLabel} ({totalInSchema.toLocaleString()} tables)
          </span>
        )}
      </div>

      {/* Catalog Source header */}
      {(scanSource || scanSchema) && (
        <div className="border border-indigo-200 rounded-xl overflow-hidden">
          {/* Level 1 — Catalog Source */}
          <div className="bg-indigo-600 text-white px-4 py-2 flex items-center justify-between">
            <span className="text-sm font-semibold tracking-wide">{scanSource || scanSchema}</span>
            <span className="text-indigo-200 text-xs">{scanned} tables scanned</span>
          </div>

          {/* Level 2 — Schema */}
          <div className="bg-indigo-50 border-b border-indigo-100 px-4 py-2 flex items-center gap-2">
            <span className="text-xs text-indigo-400 font-medium uppercase tracking-wider">Schema</span>
            <span className="text-xs font-mono font-semibold text-indigo-700">{scanSchema || scanTables[0]?.schema || "—"}</span>
          </div>

          {/* Level 3+4 — Tables with columns */}
          <div className="divide-y divide-slate-200">
            {columnsList.map((c, i) => {
              const tblMeta = scanTables[i] || {};
              return (
                <div key={i} className="px-4 py-3 space-y-2">
                  {/* Level 3 — Table */}
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <span className="text-xs text-slate-400 font-medium">TABLE</span>
                      <span className="text-sm font-mono font-bold text-slate-800">{c.table || tblMeta.name || "—"}</span>
                    </div>
                    <span className="text-xs text-slate-500 bg-slate-100 px-2 py-0.5 rounded">{c.column_count} columns</span>
                  </div>
                  {/* Level 4 — Column chips */}
                  <div className="flex flex-wrap gap-1.5">
                    {(c.columns_preview || []).map(col => (
                      <span key={col} className="text-xs bg-indigo-50 border border-indigo-100 text-indigo-700 px-2 py-0.5 rounded font-mono max-w-[200px] truncate inline-block" title={col}>{col}</span>
                    ))}
                    {c.column_count > (c.columns_preview || []).length && (
                      <span className="text-xs text-slate-400 px-2 py-0.5">+{c.column_count - (c.columns_preview || []).length} more</span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// Shared full-schema time-estimate banner (steps 2-6), styled like the Scan banner.
function EstimateBanner({ data }) {
  const elapsed = data?.elapsed_seconds ?? 0;
  const sample  = data?.sample_tables ?? 0;
  const total   = data?.total_in_schema ?? 0;
  const estMin  = data?.estimated_full_minutes ?? 0;
  const fixed   = data?.fixed_cost === true;
  if (!elapsed) return null;
  // Hide the banner when there's no real per-table count to show (avoids a
  // misleading "Processed 0 tables"). Fixed-cost steps render without a count.
  if (!fixed && sample <= 0) return null;
  const estLabel = estMin >= 60 ? `~${(estMin / 60).toFixed(1)} hr` : estMin > 0 ? `~${estMin} min` : null;
  // Fixed-cost step (e.g. Domain Structure): one-time write, does not scale with tables.
  if (fixed) {
    return (
      <div className="bg-green-50 border border-green-200 rounded-lg px-4 py-2 text-sm text-green-700 font-medium flex flex-wrap items-center gap-2">
        <span>Completed in <strong>{elapsed}s</strong></span>
        <span className="text-green-600 text-xs bg-green-100 px-2 py-0.5 rounded">One-time step — does not scale with table count</span>
      </div>
    );
  }
  return (
    <div className="bg-green-50 border border-green-200 rounded-lg px-4 py-2 text-sm text-green-700 font-medium flex flex-wrap items-center gap-2">
      <span>Processed <strong>{sample}</strong> {sample === 1 ? "table" : "tables"}{total > sample ? ` of ${total.toLocaleString()}` : ""} — <strong>{elapsed}s</strong></span>
      {estLabel && total > sample && (
        <span className="text-green-600 text-xs bg-green-100 px-2 py-0.5 rounded">Full schema: {estLabel} ({total.toLocaleString()} tables)</span>
      )}
    </div>
  );
}

function TaxonomyResult({ data }) {
  const domains = data?.domains || data?.result?.domains || [];
  const s = data?._summary || data?.result?._summary || {};
  return (
    <div className="space-y-4">
      <EstimateBanner data={data} />
      <div className="grid grid-cols-3 gap-3">
        <SummaryCard label="Domains"    value={s.domain_count || domains.length}/>
        <SummaryCard label="Subdomains" value={s.subdomain_count || "—"}/>
        <SummaryCard label="Business Terms" value={s.term_count || "—"}/>
      </div>
      {domains.map(d => (
        <div key={d.name} className="bg-slate-100 border border-slate-300 rounded-lg p-3 space-y-2">
          <div className="text-sm font-semibold text-brand">◈ {d.name}</div>
          {(d.subdomains || []).map(sd => (
            <div key={sd.name} className="ml-3">
              <div className="text-xs text-slate-600 font-semibold mb-1">◧ {sd.name}</div>
              <div className="flex flex-wrap gap-1.5 ml-3">
                {(sd.business_terms || []).map(bt => (
                  <span key={bt.name} className="text-xs bg-slate-50 border border-slate-300 text-slate-600 px-2 py-0.5 rounded shadow-sm max-w-[200px] truncate inline-block" title={bt.name}>{bt.name}</span>
                ))}
              </div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function DomainStructureResult({ data, domainItems, domainSelected }) {
  const [showSelection, setShowSelection] = React.useState(false);
  // handle both wrapped {result: {...}} and direct {created, skipped, ...} formats
  const r = (data?.result && !data.result.awaiting_approval) ? data.result : (data || {});
  // An error result (e.g. "No taxonomy in state") has no created/skipped/errors —
  // surface it instead of rendering a misleading 0/0/0 summary.
  const errMsg = data?.error || data?.result?.error || r.error;
  if (errMsg) {
    return (
      <div className="bg-red-50 border border-red-200 rounded-lg p-4">
        <div className="text-xs text-red-600 font-medium mb-1 uppercase tracking-wider">Step failed — nothing written to CDGC</div>
        <div className="text-sm text-red-700 font-mono">{errMsg}</div>
      </div>
    );
  }
  const s = r.summary || {};
  const created = r.created || [];
  const skipped = r.skipped || [];
  const errors  = r.errors  || [];

  const groups = [
    { type: "Domain",       label: "Domains",       color: "text-violet-600", bg: "bg-violet-50" },
    { type: "SubDomain",    label: "Sub-Domains",    color: "text-indigo-600", bg: "bg-indigo-50" },
    { type: "BusinessTerm", label: "Business Terms", color: "text-slate-700",  bg: "bg-slate-50"  },
  ];

  return (
    <div className="space-y-4">
      <EstimateBanner data={data} />
      <div className="grid grid-cols-3 gap-3">
        <SummaryCard label="Created" value={s.created_count ?? created.length} color="text-emerald-600"/>
        <SummaryCard label="Skipped" value={s.skipped_count ?? skipped.length} color="text-amber-600"/>
        <SummaryCard label="Errors"  value={s.error_count ?? errors.length} color={(s.error_count || errors.length) ? "text-red-600" : "text-slate-400"}/>
      </div>
      {created.length > 0 && (
        <div className="bg-slate-100 border border-slate-300 rounded-lg p-3">
          <div className="text-xs text-slate-400 font-medium mb-2 uppercase tracking-wider">Newly created</div>
          <div className="space-y-1">
            {created.map((c, i) => (
              <div key={i} className="flex items-center gap-2 text-xs">
                <span className="text-emerald-500">✓</span>
                <span className="text-slate-400 w-24">{c.type}</span>
                <span className="text-slate-700 font-medium">{c.name}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {skipped.length > 0 && (
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
          <div className="text-xs text-amber-600 font-medium mb-2 uppercase tracking-wider">Already existed (skipped)</div>
          <div className="space-y-1">
            {skipped.map((c, i) => {
              const moved   = c.reason && c.reason.includes("moved under");
              const reFailed = c.reason && c.reason.includes("re-parent failed");
              return (
                <div key={i} className="flex items-start gap-2 text-xs">
                  <span className={moved ? "text-emerald-500 mt-0.5" : reFailed ? "text-red-400 mt-0.5" : "text-amber-400 mt-0.5"}>
                    {moved ? "↪" : reFailed ? "!" : "⊘"}
                  </span>
                  <span className="text-slate-400 w-24 shrink-0">{c.type}</span>
                  <div className="flex flex-col">
                    <span className="text-slate-700 font-medium">{c.name}</span>
                    {c.reason && <span className={`text-xs mt-0.5 ${moved ? "text-emerald-500" : reFailed ? "text-red-400" : "text-amber-400"}`}>{c.reason}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {errors.length > 0 && (
        <div className="bg-red-50 border border-red-200 rounded-lg p-3">
          <div className="text-xs text-red-600 font-medium mb-2 uppercase tracking-wider">Errors</div>
          <div className="space-y-1">
            {errors.map((e, i) => (
              <div key={i} className="text-xs">
                <span className="text-red-500 font-medium">{e.type}: {e.name}</span>
                <span className="text-red-400 ml-2">— {e.error}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Collapsible view of what was approved */}
      {domainItems && domainItems.length > 0 && (
        <div className="border border-slate-200 rounded-xl overflow-hidden">
          <button
            onClick={() => setShowSelection(o => !o)}

function DomainApprovalPanel({ items, selected, onToggle, onToggleGroup, onSelectAll, onDeselectAll, onApprove, onRename, approving }) {
  const groups = [
    { type: "Domain",       label: "Domains",          color: "text-violet-600",  bg: "bg-violet-50",  border: "border-violet-200" },
    { type: "SubDomain",    label: "Sub-Domains",       color: "text-indigo-600",  bg: "bg-indigo-50",  border: "border-indigo-200" },
    { type: "BusinessTerm", label: "Business Terms",    color: "text-slate-700",   bg: "bg-slate-50",   border: "border-slate-200"  },
  ];
  const [editingName, setEditingName] = React.useState(null);
  const [editValue,   setEditValue]   = React.useState("");

  const startEdit = (name, e) => {
    e.preventDefault(); e.stopPropagation();
    setEditingName(name);
    setEditValue(name);
  };
  const commitEdit = (oldName) => {
    const newName = editValue.trim();
    if (newName && newName !== oldName) onRename(oldName, newName);
    setEditingName(null);
  };

  return (
    <div className="space-y-4">
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 flex items-center gap-3">
        <span className="text-lg">✋</span>
        <div>
          <div className="text-sm font-semibold text-amber-800">Review before creating in CDGC</div>
          <div className="text-xs text-amber-600">Deselect any items you don't want. Click a name to rename it.</div>
        </div>
      </div>

      <div className="flex items-center justify-between">
        <span className="text-xs font-semibold text-slate-500 uppercase tracking-wider">{selected.size} / {items.length} selected</span>
        <div className="flex gap-2">
          <button onClick={onSelectAll}   className="text-xs px-2.5 py-1 rounded border border-slate-300 bg-white text-slate-600 hover:border-brand hover:text-brand transition-colors">Select all</button>
          <button onClick={onDeselectAll} className="text-xs px-2.5 py-1 rounded border border-slate-300 bg-white text-slate-600 hover:border-red-300 hover:text-red-500 transition-colors">Deselect all</button>
        </div>
      </div>

      {groups.map(g => {
        const groupItems = items.filter(i => i.type === g.type);
        if (!groupItems.length) return null;
        const groupSelected = groupItems.filter(i => selected.has(i.name));
        const allChecked = groupSelected.length === groupItems.length;
        return (
          <div key={g.type} className="rounded-xl border border-slate-200 bg-white overflow-hidden shadow-sm">
            {/* Group header */}
            <div className={`flex items-center gap-2 px-4 py-2.5 ${g.bg} border-b border-slate-200`}>
              <input
                type="checkbox"
                checked={allChecked}
                onChange={() => onToggleGroup(groupItems.map(i => i.name), !allChecked)}
                className="accent-violet-600 cursor-pointer w-3.5 h-3.5"
              />
              <span className={`text-xs font-bold uppercase tracking-wider ${g.color}`}>{g.label}</span>
              <span className="text-xs text-slate-400 font-medium">{groupSelected.length} / {groupItems.length}</span>
            </div>
            {/* Item rows */}
            <div className="divide-y divide-slate-100">
              {groupItems.map(item => {
                const isSelected = selected.has(item.name);
                const isEditing  = editingName === item.name;
                return (
                  <div key={item.name}
                    className={`flex items-center gap-3 px-4 py-2.5 group transition-colors ${isSelected ? "bg-white hover:bg-slate-50" : "bg-slate-50 opacity-50"}`}>
                    <input
                      type="checkbox"
                      checked={isSelected}
                      onChange={() => onToggle(item.name)}
                      className="accent-violet-600 cursor-pointer w-3.5 h-3.5 shrink-0"
                    />
                    <div className="flex-1 min-w-0 flex items-center gap-2">
                      {isEditing ? (
                        <input
                          autoFocus
                          value={editValue}
                          onChange={e => setEditValue(e.target.value)}
                          onBlur={() => commitEdit(item.name)}
                          onKeyDown={e => { if (e.key === "Enter") commitEdit(item.name); if (e.key === "Escape") setEditingName(null); }}
                          onClick={e => e.stopPropagation()}
                          className="flex-1 border border-violet-300 rounded px-2 py-0.5 text-sm font-medium text-slate-800 outline-none bg-white shadow-inner"
                        />
                      ) : (
                        <span className="text-sm font-medium text-slate-700 break-words">{item.name}</span>
                      )}
                      {item.parent && !isEditing && (
                        <span className="shrink-0 text-xs bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded font-normal truncate max-w-[120px]" title={item.parent}>{item.parent}</span>
                      )}
                    </div>
                    <button
                      onClick={e => startEdit(item.name, e)}
                      className="shrink-0 opacity-0 group-hover:opacity-100 transition-all px-2 py-0.5 rounded bg-violet-100 text-violet-600 hover:bg-violet-200 text-xs font-medium"
                      title="Rename"
                    >✎ Rename</button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}

      <button
        onClick={onApprove}
        disabled={approving || selected.size === 0}
        className={`w-full flex items-center justify-center gap-2 px-5 py-3 rounded-xl font-semibold text-sm transition-all
          ${approving || selected.size === 0
            ? "bg-slate-100 text-slate-400 cursor-not-allowed border border-slate-200"
            : "bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white shadow-md shadow-emerald-100 hover:shadow-emerald-200"}`}
      >
        {approving ? <><Spinner/> Creating in CDGC…</> : <>✓ Approve &amp; Create ({selected.size} items)</>}
      </button>
    </div>
  );
}

function CurateResult({ data }) {
  const batches = data?.batches || [];
  const last = batches[batches.length - 1] || {};
  const totalLinked  = last.total_linked_so_far  ?? 0;
  const totalSkipped = last.total_skipped_so_far ?? batches.reduce((s, b) => s + (b.skipped || 0), 0);
  const totalCols    = (() => { const m = (last.progress || "").match(/(\d+)\/(\d+)/); return m ? parseInt(m[2]) : 0; })();
  const unmatched    = totalCols - totalLinked - totalSkipped;
  const pct          = last.progress?.match(/\((\d+)%\)/)?.[1] || "100";
  return (
    <div className="space-y-4">
      <EstimateBanner data={data} />
      <div className="grid grid-cols-3 gap-3">
        <SummaryCard label="Linked"    value={totalLinked}  color="text-emerald-600"/>
        <SummaryCard label="Skipped"   value={totalSkipped} color="text-amber-600"/>
        <SummaryCard label="Total cols" value={totalCols}   color="text-slate-500"/>
      </div>
      <div className="bg-slate-100 border border-slate-300 rounded-lg p-3">
        <div className="flex items-center gap-2 mb-1">
          <div className="flex-1 bg-slate-300 rounded-full h-2">
            <div className="bg-emerald-500 h-2 rounded-full transition-all" style={{width: `${pct}%`}}/>
          </div>
          <span className="text-xs text-slate-500 font-medium">{last.progress}</span>
        </div>
        {batches.length > 1 && (
          <div className="text-xs text-slate-400 mt-1">{totalLinked} linked · {totalSkipped} skipped{unmatched > 0 ? ` · ${unmatched} no match` : ""}</div>
        )}
      </div>
    </div>
  );
}

function SubStepRow({ label, result, detail }) {
  const s = result?.status || "";
  const ok = ["created","existing","done","published","linked","already_linked","found","partial"].some(v => s.includes(v));
  const failed = s.includes("failed") || result?.error;
  const icon = failed ? "✗" : ok ? "✓" : "–";
  const color = failed ? "text-red-500" : ok ? "text-emerald-600" : "text-slate-400";
  return (
    <div className="flex items-start gap-3 py-2 border-b border-slate-100 last:border-0">
      <span className={`text-sm font-bold w-4 shrink-0 ${color}`}>{icon}</span>
      <div className="flex-1 min-w-0">
        <div className="text-xs font-semibold text-slate-700">{label}</div>
        {result?.error && <div className="text-xs text-red-500 mt-0.5 truncate">{result.error}</div>}
        {!result?.error && detail && <div className="text-xs text-slate-500 mt-0.5">{detail}</div>}
        {!result?.error && !detail && s && <div className="text-xs text-slate-400 mt-0.5">{s}</div>}
      </div>
    </div>
  );
}

  const dqCount = dqR?.rules?.occurrences_registered?.length ?? null;
  const scCount = scR?.pushed ?? scR?.scores?.length ?? null;
  const dqErrors = dqR?.rules?.errors || [];
  const allOk  = dqOk && scOk;
  return (
    <div className="space-y-3">
      <EstimateBanner data={data} />
      <div className="bg-white border border-slate-200 rounded-xl px-4 py-2 shadow-sm">
        <SubStepRow label="DQ Rules"        result={{ status: dqOk ? "done" : dqErrors.length ? "failed" : dqR ? "done" : "", error: dqR?.error }} detail={dqCount != null ? `${dqCount} rule occurrences` : null}/>
        <SubStepRow label="Generate Scores" result={{ status: scOk ? "done" : scR ? "done" : "", error: scR?.error }} detail={scCount != null ? `${scCount} scores pushed` : null}/>
      </div>
      {dqErrors.length > 0 && (
        <div className="bg-red-50 border border-red-200 rounded-lg p-3">
          <div className="text-xs font-semibold text-red-700 mb-1">Rule creation errors ({dqErrors.length})</div>
          {dqErrors.slice(0, 3).map((e, i) => <div key={i} className="text-xs text-red-600 truncate">{e}</div>)}
          {dqErrors.length > 3 && <div className="text-xs text-red-400">…and {dqErrors.length - 3} more</div>}
        </div>
      )}
      {allOk && <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-sm font-semibold text-emerald-800">✓ DQ rules and scores registered in CDGC</div>}
    </div>
  );
}

function PublishGovernanceResult({ data }) {
  const r = data?.result || data || {};
  const ok = r.job_id || r.scan_triggered;
  const jobId = r.job_id || "—";
  const source = r.catalog_source || "—";
  const status = r.status || (ok ? "Triggered" : "—");
  return (
    <div className="space-y-3">
      <div className="grid grid-cols-2 gap-3">
        <SummaryCard label="Status"         value={status} color={ok ? "text-emerald-600" : "text-red-500"}/>
        <SummaryCard label="Catalog Source" value={source} color="text-slate-600"/>
      </div>
      {jobId !== "—" && (
        <div className="flex items-center gap-2 px-4 py-2 bg-slate-100 rounded-lg border border-slate-200">
          <span className="text-xs text-slate-400 font-medium shrink-0">Job ID</span>
          <span className="text-xs font-mono text-slate-600 break-all">{jobId}</span>
        </div>
      )}
      {ok && <div className="bg-emerald-50 border border-emerald-200 rounded-lg p-3 text-sm font-semibold text-emerald-800">✓ MCC scan triggered — real DQ scores will publish to the Governance Catalog</div>}
      {!ok && (r.trigger_error || r.note) && (
        <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
          <div className="text-xs font-semibold text-amber-800 mb-1">Why the scan didn't run</div>
          {r.trigger_error && <pre className="text-xs text-amber-800 whitespace-pre-wrap break-all">{r.trigger_error}</pre>}
          {r.note && <div className="text-xs text-amber-700 mt-2 whitespace-pre-wrap">{r.note}</div>}
        </div>
      )}
      {data?.error && <div className="bg-red-50 border border-red-200 rounded-lg p-3"><pre className="text-xs text-red-700 whitespace-pre-wrap">{data.error}</pre></div>}
    </div>
  );
}

const RESULT_RENDERERS = {
  discover:           DiscoverResult,
  scan:               ScanResult,
  taxonomy:           TaxonomyResult,
  domain_structure:   DomainStructureResult,
  curate:             CurateResult,
  data_quality:       DataQualityResult,
  publish_governance: PublishGovernanceResult,
  create_collection:        CreateCollectionResult,
  publish_marketplace_full: PublishMarketplaceFullResult,
  configure_delivery:       ConfigureDeliveryResult,
  consumer_access:     ConsumerAccessResult,
  verify_access:       VerifyAccessResult,
  withdraw_access:     WithdrawAccessResult,
};

// ── Main App ──────────────────────────────────────────────────────────────────

const LS_KEY = "idmc_gov_ui_state";

function loadPersistedState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

const VALID_STEP_IDS = new Set(STEPS.map(s => s.id));

function App() {
  const _saved = loadPersistedState();
  const _savedStep = _saved?.activeStep;
  const _initStep = (_savedStep && VALID_STEP_IDS.has(_savedStep)) ? _savedStep : "discover";

  const [activeStep, setActiveStep] = useState(_initStep);
  const [statuses,   setStatuses]   = useState(_saved?.statuses   || {});
  const [results,    setResults]    = useState(_saved?.results     || {});
  const [errors,     setErrors]     = useState({});
  const [stepProgress, setStepProgress] = useState({});
  const [showJson,   setShowJson]   = useState({});
  const abortRef = useRef(null);

  const [scanTable,  setScanTable]  = useState(_saved?.scanTable  || "");
  const [scanSchema, setScanSchema] = useState(_saved?.scanSchema || "");
  const [scanSource, setScanSource] = useState(_saved?.scanSource || "");
  // Domain structure approval state
  const [domainItems,    setDomainItems]    = useState([]);
  const [domainSelected, setDomainSelected] = useState(new Set());
  const [domainRenames,  setDomainRenames]  = useState({});
  const [domainApproving, setDomainApproving] = useState(false);
  const [subRunning, setSubRunning] = useState({});

  // Persist key state to localStorage whenever it changes
  useEffect(() => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({ activeStep, statuses, results, scanTable, scanSchema, scanSource }));
    } catch {}
  }, [activeStep, statuses, results, scanTable, scanSchema, scanSource]);

  const discoverTables    = results.discover?.result?.tables_for_selection || [];
  const discoverSources   = results.discover?.result?.catalog_sources_grouped || [];

  const setStatus = (id, s) => {
    setStatuses(prev => ({ ...prev, [id]: s }));
    if (s === STATUS.running) {
      setStepProgress(prev => ({ ...prev, [id]: 0 }));
    } else if (s === STATUS.done || s === STATUS.error) {
      setStepProgress(prev => ({ ...prev, [id]: 100 }));
      setTimeout(() => setStepProgress(prev => ({ ...prev, [id]: 0 })), 1200);
    } else {
      setStepProgress(prev => ({ ...prev, [id]: 0 }));
    }
  };

  // Advance progress bar while running
  useEffect(() => {
    const runningIds = Object.entries(statuses).filter(([, s]) => s === STATUS.running).map(([id]) => id);
    if (runningIds.length === 0) return;
    const iv = setInterval(() => {
      setStepProgress(prev => {
        const next = { ...prev };
        runningIds.forEach(id => {
          const cur = next[id] || 0;
          if (cur < 97) next[id] = cur + (97 - cur) * 0.018;
        });
        return next;
      });
    }, 150);
    return () => clearInterval(iv);
  }, [statuses]);

  const stopStep = useCallback((stepId) => {
    if (abortRef.current) {
      abortRef.current.abort();
      abortRef.current = null;
    }
    setStatus(stepId, STATUS.idle);
    setErrors(prev => ({ ...prev, [stepId]: null }));
  }, []);

  const runSubStep = useCallback(async (parentStepId, subKey, apiPath) => {
    setSubRunning(prev => ({ ...prev, [subKey]: true }));
    setErrors(prev => ({ ...prev, [parentStepId]: null }));
    try {
      const data = await apiPost(apiPath, {});
      setResults(prev => ({ ...prev, [parentStepId]: { ...(prev[parentStepId] || {}), [subKey]: data } }));
      const allKeys = parentStepId === "publish_marketplace_full"
        ? ["category","data_asset","collection","publish"]
        : ["usage_context","delivery_template","terms_of_use","delivery_target"];
      setStatuses(prev => {
        const merged = { ...(prev[parentStepId] === STATUS.done ? {} : {}), ...((results[parentStepId] || {})) };
        return { ...prev, [parentStepId]: STATUS.done };
      });
    } catch(e) {
      setResults(prev => ({ ...prev, [parentStepId]: { ...(prev[parentStepId] || {}), [subKey]: { status: "failed", error: e.message } } }));
      setStatuses(prev => ({ ...prev, [parentStepId]: STATUS.done }));
    } finally {
      setSubRunning(prev => ({ ...prev, [subKey]: false }));
    }
  }, [results]);

  const runStep = useCallback(async (stepId) => {
    const controller = new AbortController();
    abortRef.current = controller;
    setStatus(stepId, STATUS.running);
    setErrors(prev => ({ ...prev, [stepId]: null }));
    try {
      let data;
      const sig = controller.signal;
      // Basis for full-schema time estimates on steps 3-6 (from the Scan sample).
      const estBasis = {
        sample: results.scan?.tables_scanned ?? (results.scan?.columns?.filter(Boolean).length || 0),
        total:  results.scan?.total_in_schema ?? 0,
      };
      if      (stepId === "discover")         data = await apiPost("/api/step/discover", {}, sig);
      else if (stepId === "scan") {
        const isAllSchemas = scanSchema === "__ALL_SCHEMAS__";
        const isAll = isAllSchemas || scanTable === "__ALL__";
        let scanTableNames = [];
        let totalInSchema  = 0;
        let schemaArg      = scanSchema;
        if (isAllSchemas) {
          // Sample a couple of tables from every schema across all sources; extrapolate to the grand total.
          const groups = results.discover?.result?.catalog_sources_grouped || [];
          const sample = [];
          groups.forEach(cs => (cs.schemas || []).forEach(s => {
            const tbls = s.tables || [];
            totalInSchema += tbls.length;
            tbls.slice(0, 2).forEach(t => { if (sample.length < 10) sample.push(t.name); });
          }));
          scanTableNames = sample;
          schemaArg = "";   // cross-schema — backend resolves each table by name
        } else if (isAll) {
          const src = (results.discover?.result?.catalog_sources_grouped || []).find(cs => cs.source === scanSource);
          const schemaObj = (src?.schemas || []).find(s => s.schema === scanSchema);
          const allTables = schemaObj?.tables || [];
          totalInSchema   = allTables.length || (results.discover?.result?.tables_for_selection || []).filter(t => t.schema === scanSchema).length;
          const fromGrouped = allTables.map(t => t.name).slice(0, 5);
          if (fromGrouped.length > 0) {
            scanTableNames = fromGrouped;
          } else {
            scanTableNames = (results.discover?.result?.tables_for_selection || [])
              .filter(t => t.schema === scanSchema)
              .map(t => t.name)
              .slice(0, 5);
          }
        }
        data = await apiPost("/api/step/scan", {
          table:                  isAll ? "" : scanTable,
          schema:                 schemaArg,
          scan_all:               isAll,
          table_names:            scanTableNames,
          total_tables_in_schema: totalInSchema,
        }, sig);
      }
      else if (stepId === "taxonomy") {
        // Collect scanned table names from the scan result columns
        const scannedCols = results.scan?.columns || [];
        const scannedNames = scannedCols.map(c => c?.table).filter(Boolean);
        data = await apiPost("/api/step/taxonomy", {
          table_names: scannedNames,
          sample_tables: estBasis.sample, total_in_schema: estBasis.total,
        }, sig);
      }
      else if (stepId === "domain_structure") {
        const preview = await apiPost("/api/step/domain_structure/preview", {
          sample_tables: estBasis.sample, total_in_schema: estBasis.total,
        }, sig);
        if (preview?.result?.awaiting_approval) {
          const allItems = preview.result.items || [];
          setDomainItems(allItems);
          setDomainSelected(new Set(allItems.map(i => i.name)));
          setDomainRenames({});
          abortRef.current = null;
          setStatus(stepId, STATUS.idle);
          return;
        }
        data = preview;
      }
      else if (stepId === "curate")            data = await apiPost("/api/step/curate", { sample_tables: estBasis.sample, total_in_schema: estBasis.total }, sig);
      else if (stepId === "data_quality")      data = await apiPost("/api/step/data_quality", { sample_tables: estBasis.sample, total_in_schema: estBasis.total }, sig);
      else if (stepId === "publish_governance")    data = await apiPost("/api/step/mcc_scan", {}, sig);
      else if (stepId === "create_collection")     data = await apiPost("/api/step/create_collection", {}, sig);
      else if (stepId === "publish_marketplace_full") data = await apiPost("/api/step/publish_marketplace", {}, sig);
      else if (stepId === "publish_marketplace_full") data = await apiPost("/api/step/publish_marketplace_full", {}, sig);
      else if (stepId === "configure_delivery")       data = await apiPost("/api/step/configure_delivery", {}, sig);
      else if (stepId === "consumer_access")        data = await apiPost("/api/step/consumer_access", {}, sig);
      else if (stepId === "auto_approve_access") {
        data = await apiPost("/api/step/auto_approve_access", {}, sig);
        setResults(prev => ({ ...prev, consumer_access: data }));
        setStatus("consumer_access", STATUS.done);
        return;
      }
      else if (stepId === "verify_access")          data = await apiPost("/api/step/verify_access", {}, sig);
      else if (stepId === "withdraw_access")       data = await apiPost("/api/step/withdraw_access", {}, sig);

      abortRef.current = null;
      setResults(prev => ({ ...prev, [stepId]: data }));
      // An error-shaped result ({error} or {result:{error}}) carries no status field,
      // so it must be detected explicitly — otherwise a hard failure renders as a
      // green "Completed 0/0/0" (the step's summary reads empty created/skipped/errors).
      const errMsg = data?.error || data?.result?.error;
      const isFailed = !!errMsg
        || data?.status === "failed"
        || (typeof data?.status === "number" && data.status >= 400);
      if (errMsg) setErrors(prev => ({ ...prev, [stepId]: errMsg }));
      setStatus(stepId, isFailed ? STATUS.error : STATUS.done);
    } catch (err) {
      if (err.name === "AbortError") return;
      setErrors(prev => ({ ...prev, [stepId]: err.message }));
      setStatus(stepId, STATUS.error);
    }
  }, [scanTable, scanSchema, scanSource]);

  const approveDomainStructure = useCallback(async () => {
    setDomainApproving(true);
    setStatus("domain_structure", STATUS.running);
    setErrors(prev => ({ ...prev, domain_structure: null }));
    try {
      const domainData = await apiPost("/api/step/domain_structure/approve", {
        approved_names: Array.from(domainSelected),
        renames: Object.keys(domainRenames).length > 0 ? domainRenames : undefined,
      });
      const sysData = await apiPost("/api/step/system_dataset", {});
      setResults(prev => ({ ...prev, domain_structure: { ...domainData, system_dataset: sysData } }));
      setStatus("domain_structure", STATUS.done);
      setDomainItems([]);
    } catch (err) {
      setErrors(prev => ({ ...prev, domain_structure: err.message }));
      setStatus("domain_structure", STATUS.error);
    } finally {
      setDomainApproving(false);
    }
  }, [domainSelected]);

  const toggleDomainItem = useCallback((name) => {
    setDomainSelected(prev => {
      const next = new Set(prev);
      const item = domainItems.find(i => i.name === name);
      if (next.has(name)) {
        // deselect: cascade DOWN — uncheck all children
        next.delete(name);
        if (item?.type === "Domain") {
          domainItems.filter(i => i.type === "SubDomain" && i.parent === name).forEach(sd => {
            next.delete(sd.name);
            domainItems.filter(i => i.type === "BusinessTerm" && i.parent === sd.name).forEach(bt => next.delete(bt.name));
          });
        }
        if (item?.type === "SubDomain") {
          domainItems.filter(i => i.type === "BusinessTerm" && i.parent === name).forEach(bt => next.delete(bt.name));
        }
      } else {
        // select: cascade DOWN — check all children
        next.add(name);
        if (item?.type === "Domain") {
          domainItems.filter(i => i.type === "SubDomain" && i.parent === name).forEach(sd => {
            next.add(sd.name);
            domainItems.filter(i => i.type === "BusinessTerm" && i.parent === sd.name).forEach(bt => next.add(bt.name));
          });
        }
        if (item?.type === "SubDomain") {
          domainItems.filter(i => i.type === "BusinessTerm" && i.parent === name).forEach(bt => next.add(bt.name));
          // cascade UP to Domain
          const dom = domainItems.find(i => i.type === "Domain" && i.name === item.parent);
          if (dom) next.add(dom.name);
        }
        if (item?.type === "BusinessTerm") {
          // cascade UP to SubDomain and Domain
          const sd = domainItems.find(i => i.type === "SubDomain" && i.name === item.parent);
          if (sd) {
            next.add(sd.name);
            const dom = domainItems.find(i => i.type === "Domain" && i.name === sd.parent);
            if (dom) next.add(dom.name);
          }
        }
      }
      return next;
    });
  }, [domainItems]);

  const toggleDomainGroup = useCallback((names, add) => {
    setDomainSelected(prev => {
      const next = new Set(prev);
      names.forEach(n => {
        if (add) {
          next.add(n);
          // cascade up when selecting a group
          const item = domainItems.find(i => i.name === n);
          if (item?.type === "BusinessTerm") {
            const sd = domainItems.find(i => i.type === "SubDomain" && i.name === item.parent);
            if (sd) {
              next.add(sd.name);
              const dom = domainItems.find(i => i.type === "Domain" && i.name === sd.parent);
              if (dom) next.add(dom.name);
            }
          }
          if (item?.type === "SubDomain") {
            const dom = domainItems.find(i => i.type === "Domain" && i.name === item.parent);
            if (dom) next.add(dom.name);
          }
        } else {
          next.delete(n);
        }
      });
      return next;
    });
  }, [domainItems]);

  const renameDomainItem = useCallback((oldName, newName) => {
    // Track rename: resolve back to original name in case item was already renamed once
    setDomainRenames(prev => {
      const original = Object.keys(prev).find(k => prev[k] === oldName) || oldName;
      const next = { ...prev };
      if (original === newName) { delete next[original]; } else { next[original] = newName; }
      return next;
    });
    setDomainItems(prev => prev.map(i => {
      if (i.name === oldName) return { ...i, name: newName };
      if (i.parent === oldName) return { ...i, parent: newName };
      return i;
    }));
    setDomainSelected(prev => {
      const next = new Set(prev);
      if (next.has(oldName)) { next.delete(oldName); next.add(newName); }
      return next;
    });
  }, []);

  const skipStep = useCallback((stepId) => {
    setStatus(stepId, STATUS.skipped);
    setResults(prev => ({ ...prev, [stepId]: null }));
  }, []);

  const active = STEPS.find(s => s.id === activeStep) || STEPS[0];
  const ResultComponent = RESULT_RENDERERS[activeStep];
  // Domain Structure (Step 4) reads the taxonomy from the active table slot; it must not
  // run before Step 3 has produced a taxonomy for the selected table, or it silently
  // writes nothing. Taxonomy status persists in localStorage across reloads.
  const taxonomyReady = statuses["taxonomy"] === STATUS.done || !!results.taxonomy;
  const canRun = (activeStep !== "scan" || (scanSchema && scanTable))
              && (activeStep !== "marketplace" || marketplaceCollectionId)
              && (activeStep !== "domain_structure" || taxonomyReady);
  // scanSource is optional — schema alone is sufficient for the scan API

  return (
    <div className="flex flex-col h-screen text-slate-800">

      {/* Header */}
      <header className="flex items-center gap-4 px-6 py-3.5 bg-slate-100 border-b border-slate-300 shadow-sm shrink-0">
        <div className="flex items-center gap-2.5">
          <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center font-bold text-white text-sm shadow-md shadow-indigo-200">I</div>
          <div>
            <div className="font-bold text-slate-800 text-sm tracking-wide">INCEPT</div>
            <div className="text-xs text-slate-400 -mt-0.5 tracking-widest uppercase">Data Governance</div>
          </div>
        </div>
        <div className="h-5 w-px bg-slate-200 mx-1"/>
        <div className="text-sm text-slate-500">IDMC CDGC Onboarding Pipeline</div>
        <div className="ml-auto flex items-center gap-3">
          <button
            onClick={async () => {
              // Clear SERVER-side pipeline state too, not just the browser — otherwise
              // the next session inherits stale state and the dispatcher can misroute.
              try { await fetch('/api/reset', { method: 'POST' }); } catch (e) {}
              localStorage.removeItem(LS_KEY); window.location.reload();
            }}
            className="text-xs px-3 py-1.5 rounded-lg border border-red-300 text-red-500 font-semibold bg-red-50 hover:bg-red-100 hover:border-red-400 transition-colors"
            title="Clear session (server + browser) and start fresh"
          >↺ New Session</button>
          <div className="w-2 h-2 rounded-full bg-emerald-500"/>
          <span className="text-xs text-slate-400 font-medium">MCP servers online</span>
        </div>
      </header>

      <div className="flex flex-1 overflow-hidden">

        {/* Sidebar */}
        <aside className="w-60 bg-slate-100 border-r border-slate-300 flex flex-col shrink-0 overflow-hidden py-1">
          {STEPS.map(step => {
            const status = statuses[step.id] || STATUS.idle;
            const isActive = step.id === activeStep;
            return (
              <button
                key={step.id}
                onClick={() => setActiveStep(step.id)}
                className={`w-full text-left px-3 py-1.5 flex items-center gap-2 transition-colors text-xs
                  ${isActive
                    ? "bg-indigo-50 text-indigo-700 border-r-2 border-brand font-semibold"
                    : "text-slate-500 hover:bg-slate-50 hover:text-slate-800"}`}
              >
                <StatusDot status={status}/>
                <span className="flex-1 truncate">{step.label}</span>
                <span className={`text-xs font-medium ${isActive ? "text-indigo-400" : "text-slate-300"}`}>{step.num}</span>
              </button>
            );
          })}
        </aside>

        {/* Main content */}
        <main className="flex-1 overflow-y-auto scrollbar-thin bg-slate-200 p-6">
          <div className="max-w-2xl mx-auto space-y-5">

            {/* Step header */}
            <div>
              <div className="flex items-center gap-2 mb-1">
                {(() => { const idx = STEPS.findIndex(s => s.id === activeStep); const prev = STEPS[idx - 1]; return prev ? (
                  <button onClick={() => setActiveStep(prev.id)} className="text-xs text-slate-400 hover:text-brand font-medium mr-1">← {prev.label}</button>
                ) : null; })()}
                <span className="text-xs font-mono text-slate-400 font-medium">STEP {active.num} / {STEPS.length}</span>
                {statuses[activeStep] === STATUS.running && <Spinner/>}
              </div>
              <h1 className="text-xl font-bold text-slate-800">{active.label}</h1>
              <p className="text-sm text-slate-500 mt-0.5">{active.desc}</p>
            </div>

            {/* Progress bar — visible while running or briefly on completion */}
            {(stepProgress[activeStep] > 0) && (
              <div className="w-full">
                <div className="flex items-center justify-between mb-1">
                  <span className="text-xs text-slate-500 font-medium">
                    {statuses[activeStep] === STATUS.running ? "Running…" : "Complete"}
                  </span>
                  <span className="text-xs font-mono text-slate-400">{Math.round(stepProgress[activeStep])}%</span>
                </div>
                <div className="w-full h-2 bg-slate-200 rounded-full overflow-hidden">
                  <div
                    className={`h-full rounded-full progress-bar-fill ${statuses[activeStep] !== STATUS.running ? "done" : ""}`}
                    style={{ width: `${stepProgress[activeStep]}%` }}
                  />
                </div>
              </div>
            )}

            {/* Scan inputs */}
            {activeStep === "scan" && (
              <div className="bg-slate-50 rounded-xl p-4 space-y-3 border border-slate-300 shadow-sm">
                {(() => {
                  // Single Schema dropdown across all catalog sources; the source is
                  // auto-derived from the chosen schema (the scan API keys off schema).
                  const allSchemaEntries = [];
                  discoverSources.forEach(cs => (cs.schemas || []).forEach(s =>
                    allSchemaEntries.push({ source: cs.source, schema: s.schema, tables: s.tables || [] })));
                  const schemaNames      = [...new Set(allSchemaEntries.map(e => e.schema))].filter(Boolean);
                  const grandTotalTables = allSchemaEntries.reduce((n, e) => n + (e.tables?.length || 0), 0);
                  const allSchemasMode   = scanSchema === "__ALL_SCHEMAS__";
                  const selectedEntry    = allSchemaEntries.find(e => e.schema === scanSchema);
                  const tablesInSchema   = selectedEntry ? selectedEntry.tables : [];
                  // Fallback: if no grouped data, use flat discoverTables
                  const fallbackSchemas  = [...new Set(discoverTables.map(t => t.schema))].filter(Boolean);
                  const fallbackTables   = discoverTables.filter(t => t.schema === scanSchema);
                  const pickSchema = (val) => {
                    setScanSchema(val);
                    setScanTable("__ALL__");
                    const entry = allSchemaEntries.find(e => e.schema === val);
                    setScanSource(entry ? entry.source : "");   // derive catalog source
                  };
                  return (
                    <>
                      {/* Schema dropdown (catalog source auto-derived) */}
                      <div>
                        <label className="block text-xs text-slate-500 font-medium mb-1">Schema</label>
                        {(schemaNames.length > 0 || fallbackSchemas.length > 0) ? (
                          <select
                            value={scanSchema}
                            onChange={e => pickSchema(e.target.value)}
                            className="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-brand focus:ring-2 focus:ring-indigo-100"
                          >
                            <option value="">Select a schema…</option>
                            {schemaNames.length > 0 && grandTotalTables > 0 && (
                              <option value="__ALL_SCHEMAS__">⚡ All schemas ({grandTotalTables.toLocaleString()} tables total — samples a few, estimates full run)</option>
                            )}
                            {(schemaNames.length > 0 ? schemaNames : fallbackSchemas).map(s => <option key={s} value={s}>{s}</option>)}
                          </select>
                        ) : (
                          <input type="text" placeholder="SCHEMA_NAME" value={scanSchema}
                            onChange={e => pickSchema(e.target.value)}
                            className="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-brand focus:ring-2 focus:ring-indigo-100 font-mono"
                          />
                        )}
                      </div>
                      {/* Table dropdown (hidden when scanning all schemas) */}
                      <div className={allSchemasMode ? "hidden" : ""}>
                        <label className="block text-xs text-slate-500 font-medium mb-1">Table</label>
                        {(tablesInSchema.length > 0 || fallbackTables.length > 0) ? (
                          <select
                            value={scanTable}
                            onChange={e => setScanTable(e.target.value)}
                            className="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-brand focus:ring-2 focus:ring-indigo-100"
                          >
                            {(() => {
                              const tbl = tablesInSchema.length > 0 ? tablesInSchema : fallbackTables;
                              return (
                                <>
                                  <option value="__ALL__">⚡ Scan all {tbl.length.toLocaleString()} tables in this schema (samples a few, estimates full run)</option>
                                  {tbl.map(t => <option key={t.name} value={t.name}>{t.name}</option>)}
                                </>
                              );
                            })()}
                          </select>
                        ) : (
                          <input type="text" placeholder="TABLE_NAME (or leave blank to scan all)" value={scanTable}
                            onChange={e => setScanTable(e.target.value)}
                            className="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-brand focus:ring-2 focus:ring-indigo-100 font-mono"
                          />
                        )}
                      </div>
                    </>
                  );
                })()}
              </div>
            )}

            {/* Marketplace collection ID input */}
            {activeStep === "marketplace" && (
              <div className="bg-slate-50 rounded-xl p-4 space-y-3 border border-slate-300 shadow-sm">
                <div>
                  <label className="block text-xs text-slate-500 font-medium mb-1">Data Marketplace Collection ID</label>
                  <input
                    type="text"
                    placeholder="e.g. a1b2c3d4-e5f6-..."
                    value={marketplaceCollectionId}
                    onChange={e => setMarketplaceCollectionId(e.target.value)}
                    className="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-800 focus:outline-none focus:border-brand focus:ring-2 focus:ring-indigo-100 font-mono"
                  />
                  <p className="text-xs text-slate-400 mt-1">Found in your DMP instance under Data Collections. Set <code>DMP_COLLECTION_ID</code> in .env to pre-fill.</p>
                </div>
              </div>
            )}

            {/* Domain structure approval panel */}
            {activeStep === "domain_structure" && domainItems.length > 0 && statuses["domain_structure"] !== STATUS.done && (
              <DomainApprovalPanel
                items={domainItems}
                selected={domainSelected}
                onToggle={toggleDomainItem}
                onToggleGroup={toggleDomainGroup}
                onSelectAll={() => setDomainSelected(new Set(domainItems.map(i => i.name)))}
                onDeselectAll={() => setDomainSelected(new Set())}
                onApprove={approveDomainStructure}
                onRename={renameDomainItem}
                approving={domainApproving}
              />
            )}

            {/* Sub-step buttons for Steps 10 & 11 */}
            {(activeStep === "data_quality" || activeStep === "create_collection" || activeStep === "configure_delivery") && (() => {
              const subSteps = activeStep === "data_quality" ? [
                { key: "dq_rules", label: "DQ Rules",       path: "/api/step/dq_rules" },
                { key: "scores",   label: "Generate Scores", path: "/api/step/scores" },
              ] : activeStep === "create_collection" ? [
                { key: "category",   label: "Category",      path: "/api/step/cdmp_category" },
                { key: "data_asset", label: "Data Asset",    path: "/api/step/cdmp_data_asset" },
                { key: "collection", label: "Collection",    path: "/api/step/cdmp_collection" },
              ] : [
                { key: "usage_context",     label: "Usage Contexts",   path: "/api/step/usage_context" },
                { key: "delivery_template", label: "Delivery Template", path: "/api/step/delivery_template" },
                { key: "terms_of_use",      label: "Terms of Use",     path: "/api/step/terms_of_use" },
                { key: "delivery_target",   label: "Delivery Target",  path: "/api/step/delivery_target" },
              ];
              const anyRunning = statuses[activeStep] === STATUS.running || Object.values(subRunning).some(Boolean);
              return (
                <div className="space-y-2">
                  <div className="text-xs text-slate-400 font-medium uppercase tracking-wider">Run individually</div>
                <div className="flex flex-wrap gap-2">
                  {subSteps.map(ss => {
                    const isRunning = subRunning[ss.key];
                    const res = results[activeStep]?.[ss.key];
                    const ok = res && !res.error && ["created","existing","done","published","linked","already_linked","found","partial"].some(v => (res.status||"").includes(v));
                    const failed = res?.error || (res && (res.status||"").includes("failed"));
                    return (
                      <button
                        key={ss.key}
                        onClick={() => runSubStep(activeStep, ss.key, ss.path)}
                        disabled={anyRunning}
                        className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold border transition-all shadow-sm
                          ${isRunning ? "bg-indigo-100 border-indigo-300 text-indigo-500 cursor-not-allowed"
                          : failed    ? "bg-red-100 border-red-400 text-red-700 hover:bg-red-200"
                          : ok        ? "bg-emerald-100 border-emerald-400 text-emerald-800 hover:bg-emerald-200"
                          :             "bg-indigo-600 border-indigo-700 text-white hover:bg-indigo-500"}`}
                      >
                        {isRunning ? <Spinner/> : ok ? <span className="text-emerald-500">✓</span> : failed ? <span className="text-red-500">✗</span> : null}
                        {ss.label}
                      </button>
                    );
                  })}
                </div>
                </div>
              );
            })()}

            {/* Run / Stop / Skip buttons */}
            {!(activeStep === "domain_structure" && domainItems.length > 0 && statuses["domain_structure"] !== STATUS.done) && (
            <div className="flex items-center gap-3">
              <button
                onClick={() => runStep(activeStep)}
                disabled={statuses[activeStep] === STATUS.running || !canRun}
                className={`flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold text-sm transition-all
                  ${statuses[activeStep] === STATUS.running || !canRun
                    ? "bg-slate-100 text-slate-400 cursor-not-allowed border border-slate-200"
                    : "bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-500 hover:to-indigo-500 text-white shadow-md shadow-indigo-200 hover:shadow-indigo-300"}`}
              >
                {statuses[activeStep] === STATUS.running ? (
                  <><Spinner/> Running…</>
                ) : statuses[activeStep] === STATUS.done ? (
                  <><span className="text-emerald-300">✓</span> Re-run Step</>
                ) : (
                  <><span>▶</span> Run Step</>
                )}
              </button>

              {activeStep === "domain_structure" && !taxonomyReady && (
                <span className="text-xs text-amber-600 font-medium">
                  Run <strong>Generate Taxonomy</strong> (Step 3) for this table first.
                </span>
              )}

              {statuses[activeStep] === STATUS.running && (
                <button
                  onClick={() => stopStep(activeStep)}
                  className="flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-semibold text-red-600 border border-red-200 bg-red-50 hover:bg-red-100 hover:border-red-300 transition-all"
                >
                  <span>■</span> Stop
                </button>
              )}

              {SKIPPABLE.has(activeStep) && statuses[activeStep] !== STATUS.running && (
                <button
                  onClick={() => skipStep(activeStep)}
                  className="flex items-center gap-2 px-4 py-2.5 rounded-lg text-sm text-slate-600 border border-slate-300 bg-slate-50 hover:border-slate-400 hover:text-slate-800 shadow-sm transition-all"
                >
                  Skip
                </button>
              )}
            </div>
            )}

            {/* Error */}
            {errors[activeStep] && (
              <div className="bg-red-50 border border-red-200 rounded-xl p-4">
                <div className="text-xs font-semibold text-red-600 mb-1 uppercase tracking-wider">Error</div>
                <div className="text-sm text-red-700 font-mono">{errors[activeStep]}</div>
              </div>
            )}

            {/* Skipped notice */}
            {statuses[activeStep] === STATUS.skipped && (() => {
              const idx = STEPS.findIndex(s => s.id === activeStep);
              const next = STEPS[idx + 1];
              return (
                <div className="space-y-3">
                  <div className="bg-slate-50 rounded-xl p-4 border border-slate-300 shadow-sm flex items-center gap-3">
                    <span className="text-slate-400 text-lg">⊘</span>
                    <div>
                      <div className="text-sm font-semibold text-slate-600">Step skipped</div>
                      <div className="text-xs text-slate-400">This step was skipped for this demo run.</div>
                    </div>
                  </div>
                  {next && (
                    <div className="flex justify-end pt-1">
                      <button
                        onClick={() => setActiveStep(next.id)}
                        className="flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold text-sm bg-slate-50 border border-slate-300 text-slate-600 hover:border-brand hover:text-brand shadow-sm transition-all"
                      >
                        Next: {next.label} <span>→</span>
                      </button>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* Results */}
            {results[activeStep] && !(activeStep === "domain_structure" && domainItems.length > 0 && statuses["domain_structure"] !== STATUS.done) && (
              <div className="space-y-3">
                <div className="flex items-center justify-between">
                  <div className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Result</div>
                  <button
                    onClick={() => setShowJson(prev => ({ ...prev, [activeStep]: !prev[activeStep] }))}
                    className="text-xs text-slate-400 hover:text-brand font-medium"
                  >
                    {showJson[activeStep] ? "Show summary" : "Show raw JSON"}
                  </button>
                </div>

                {/* Next button (top) */}
                {(statuses[activeStep] === STATUS.done || statuses[activeStep] === STATUS.skipped) && (() => {
                  const idx = STEPS.findIndex(s => s.id === activeStep);
                  const next = STEPS[idx + 1];
                  if (!next) return null;
                  return (
                    <div className="flex justify-end">
                      <button
                        onClick={() => setActiveStep(next.id)}
                        className="flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold text-sm bg-slate-50 border border-slate-300 text-slate-600 hover:border-brand hover:text-brand shadow-sm transition-all"
                      >
                        Next: {next.label} <span>→</span>
                      </button>
                    </div>
                  );
                })()}

                <div className="bg-slate-50 rounded-xl p-4 border border-slate-300 shadow-sm">
                  {showJson[activeStep]
                    ? <JsonViewer data={results[activeStep]}/>
                    : <ResultComponent data={results[activeStep]} domainItems={domainItems} domainSelected={domainSelected} scanSource={scanSource} scanSchema={scanSchema}/>
                  }
                </div>

                {/* Next button (bottom) */}
                {(statuses[activeStep] === STATUS.done || statuses[activeStep] === STATUS.skipped) && (() => {
                  const idx = STEPS.findIndex(s => s.id === activeStep);
                  const next = STEPS[idx + 1];
                  if (!next) return null;
                  return (
                    <div className="flex justify-end pt-1">
                      <button
                        onClick={() => setActiveStep(next.id)}
                        className="flex items-center gap-2 px-5 py-2.5 rounded-lg font-semibold text-sm bg-slate-50 border border-slate-300 text-slate-600 hover:border-brand hover:text-brand shadow-sm transition-all"
                      >
                        Next: {next.label} <span>→</span>
                      </button>
                    </div>
                  );
                })()}
              </div>
            )}

          </div>
        </main>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
